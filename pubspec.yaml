name: cozy_world
description: "A Flutter application for managing important dates, daily support messages, categorized content, and memories. Demonstrates clean architecture, GraphQL integration, state management with GetX, and secure local storage."
publish_to: 'none'
version: 1.2.0+3

environment:
  sdk: ^3.10.3


dependencies:
  flutter:
    sdk: flutter
  get: ^4.7.3
  #firebase_core: ^4.3.0
  #firebase_messaging: ^16.1.0
  #intl: ^0.20.2
  flutter_secure_storage: ^10.0.0
  audioplayers: ^6.5.1
  google_fonts: ^8.0.2
  flutter_svg: ^2.2.3
  lottie: ^3.3.2
  common_locale_data: ^2.2.1
  ferry: ^0.16.0+1
  ferry_flutter: ^0.9.1+1
  gql_http_link: ^1.2.0
  gql_code_builder_serializers: ^0.1.0+1
  get_storage: ^2.1.1
  flip_card: ^0.7.0
  flutter_card_swiper: ^7.2.0
  auto_size_text: ^3.0.0
  strings_api:
    path: packages/strings_api
  strings_impl:
    path: packages/strings_impl
  dates_api:
    path: packages/dates_api
  dates_impl:
    path: packages/dates_impl
  app_assets:
    path: packages/app_assets


dev_dependencies:
  flutter_test:
    sdk: flutter
  # device_preview: ^1.3.1
  build_runner: ^2.10.4
  ferry_generator: ^0.12.0+3
  flutter_launcher_icons: ^0.14.4
  # flutter_gherkin: ^2.0.0

  flutter_lints: ^6.0.0

flutter:

  uses-material-design: true

  assets:
    - assets/


  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Proы
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package
flutter_launcher_icons:
      android: "launcher_icon"
      ios: true
      image_path: "assets/app_icons/app_icon.png"
      adaptive_icon_background: "assets/app_icons/app_icon_background.png"
      adaptive_icon_foreground: "assets/app_icons/app_icon.png"
      adaptive_icon_monochrome: "assets/app_icons/app_icon_monochrome.png"
      min_sdk_android: 21
