name: Сканирование секретов

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  secrets-scan:
    name: Сканировать на утечки секретов
    runs-on: ubuntu-latest

    steps:
      - name: Получить исходный код
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # - name: TruffleHog сканирование секретов
      #   uses: trufflesecurity/trufflehog@main
      #   with:
      #     path: ./
      #     base: ${{ github.event.repository.default_branch }}
      #     head: HEAD
      #     extra_args: --debug --only-verified

      - name: Gitleaks - Обнаружение секретов
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Обнаружить приватные ключи
        run: |
          if grep -r --include="*.properties" --include="*.env" --include="*.key" \
            "storePassword\|keyPassword\|apiKey\|BEGIN.*PRIVATE KEY" . \
            --exclude-dir=.git \
            --exclude-dir=build \
            --exclude-dir=.dart_tool \
            --exclude="*.example" \
            --exclude="*.template"; then
            echo "::error::Потенциальные секреты обнаружены в отслеживаемых файлах!"
            exit 1
          else
            echo "✓ Явных секретов в отслеживаемых файлах не обнаружено"
          fi

  check-gitignore:
    name: Проверить соответствие .gitignore
    runs-on: ubuntu-latest

    steps:
      - name: Получить исходный код
        uses: actions/checkout@v4

      - name: Проверить на неигнорируемые чувствительные файлы
        run: |
          echo "Проверка на потенциально опасные паттерны в отслеживаемых файлах..."

          # Файлы которые НИКОГДА не должны быть отслеживаемы
          DANGEROUS_PATTERNS=(
            "android/key.properties"
            "lib/config/.env"
            "pubspec_overrides.yaml"
            "*.keystore"
            "*.jks"
            "google-services.json"
            "GoogleService-Info.plist"
          )

          FOUND_VIOLATIONS=0
          for pattern in "${DANGEROUS_PATTERNS[@]}"; do
            if git ls-files --error-unmatch "$pattern" 2>/dev/null; then
              echo "::error::Опасный файл отслеживается: $pattern"
              FOUND_VIOLATIONS=$((FOUND_VIOLATIONS + 1))
            fi
          done

          if [ $FOUND_VIOLATIONS -gt 0 ]; then
            echo "::error::Обнаружено $FOUND_VIOLATIONS файлов которые должны быть в gitignore!"
            exit 1
          fi

          echo "✓ Опасные файлы не отслеживаются"
