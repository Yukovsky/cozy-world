query ReadTypeMessages($read: Boolean!) {
  messagesCollection(
    filter: {
      and: [
        {
          or: [
            {category: {neq: "daily"}},
            {category: {is: NULL}}
          ]
        },
        {is_read: {eq: $read}}
      ]
    }
  ) {
    edges {
      node {
        message_id
        type
        content
        category
      }
    }
  }
}
